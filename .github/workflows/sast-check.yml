name: Trust-Transpiler CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Testes Unitários e Demo
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Racket
        run: |
          sudo apt-get update
          sudo apt-get install -y racket
      - name: Rodar Analise de Demo
        run: racket main.rkt --demo
      - name: Rodar Testes Unitários
        run: racket test/taint_test.rkt

  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Trust-Transpiler
        run: ./run.sh --diff --strict-mode
        # O script falhará se o exit code for 1 devido ao Gatekeeper

  # Job 2: Análise de Diff para PRs (apenas em Pull Requests)
  sast-scan-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Necessário para o git diff funcionar

      - name: Install Racket
        run: sudo apt-get install -y racket

      - name: Run Diff Scan
        run: |
          chmod +x run.sh
          # Executa o scan incremental apenas nos arquivos alterados com strict-mode ativado
          ./run.sh --diff origin/${{ github.base_ref }}..HEAD --fail-on high --no-color --strict-mode

# Job 3: Validação de Integridade do Pipeline (Sanity Check)
  pipeline-integrity:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Racket
        run: |
          sudo apt-get update
          sudo apt-get install -y racket
      - name: Executar Pipeline de Integridade
        run: |
          chmod +x test/full_pipeline_test.sh
          ./test/full_pipeline_test.sh